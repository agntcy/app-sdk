---
name: python-build
on:
  workflow_call:

jobs:
  python-build-wheel:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: ./.github/actions/setup-python
        with:
          uv-install: true
      - name: Install dependencies
        run: uv sync
      - name: Build wheel
        run: task packaging
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: ./dist
